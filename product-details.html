<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Geo Wear - Product Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400&display=swap"
    rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Styles.CSS">
</head>

<body>

  <header>
    <nav class="navbar">
      <a class="navbar-brand d-flex align-items-center logo-text" href="index.html">
        <img src="./images/Logo.png" alt="Logo" class="logo-img me-2"> Geo Wear</a>
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="product-details.html">product-details</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="Login.html">Login</a></li>
        <li><a href="Register.html">Register</a></li>
        <li><a href="Profile.html">Profile</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="container mt-5">
    <h2 id="name"></h2>
    <p id="price"></p>
    <p id="desc"></p>
    <img id="img" class="img-fluid rounded shadow" width="300">
    <br><br>
    <label>Quantity:</label>
    <input type="number" id="quantity" value="1" min="1">
    <p class="mt-2">Total: <span id="total"></span></p>
    <button class="btn btn-primary" onclick="addToCart()">Add to Cart</button>
  </div>

  <script>
    const products = [
      { id: 1, name: "Women classic dress", price: 575.73, desc: "Beautiful Hand Made One Of A Kind Ivory Raw Silk Georgian Rococo 1700s" },
      { id: 2, name: "men classic dress", price: 150, desc: "Custom White Regency Tailcoat" },
      { id: 3, name: "Costume", price: 255.07, desc: "Black Wool Chokha, Georgian Bekirka Dance Costume" },
      { id: 4, name: "Venetian Tabarro Cloak", price: 294.44, desc: "Black Capelet, Full-Circle Cut, Crafted in Wool" },
      { id: 5, name: "kids chokha", price: 360.62, desc: "Ethnic coat without accessories" },
      { id: 6, name: "Georgian anthique swords", price: 1097.71, desc: "Handmade Caucasian Georgian Shashka, Curved Sabre/Dagger/Sword Handgemachter" },
      { id: 7, name: "Dagger", price: 252.44, desc: "Antique Georgian Hospital Orderly's Sword" },
      { id: 8, name: "Orderly swords", price: 621.99, desc: "Antique Georgian Hospital Orderly's Sword" },
      { id: 9, name: "Traditional hat", price: 93.76, desc: "Georgian Traditional Hand Embroidered Hat" },
      { id: 10, name: "Skufia Hat", price: 72.11, desc: "Hand Embroidered Georgian Traditional Cap" },
    ];
    const params = new URLSearchParams(window.location.search);
    const productId = parseInt(params.get("id"));
    const product = products.find(p => p.id === productId);
    if (product) {
      document.getElementById("name").textContent = product.name;
      document.getElementById("price").textContent = "$" + product.price.toFixed(2);
      document.getElementById("desc").textContent = product.desc;

    } else {
      document.getElementById("name").textContent = "The product was not found";
    }
    function addToCart() {
      const quantity = document.getElementById("quantity").value;
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.push({
        id: product.id,
        name: product.name,
        price: product.price,
        quantity: quantity
      });
      localStorage.setItem("cart", JSON.stringify(cart));
      alert("The product was added to the cart");
    }
  </script>
  <footer class="bg-dark text-white mt-5 py-4">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-4 text-start">
          <p class="mb-0">© 2026 Geo Wear</p>
        </div>
        <div class="col-md-4 text-center">
          <p class="mb-0">Email: helpcenter@geowear.com</p>
        </div>
        <div class="col-md-4 text-end">
          <a href="#" class="text-white">Back to top</a>
        </div>
      </div>
    </div>
  </footer>
</body>

</html>
