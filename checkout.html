<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Geo Wear - Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Styles.CSS">
</head>

<body>
    <header>
        <nav class="navbar bg-dark px-4">
            <a class="navbar-brand d-flex align-items-center logo-text" href="index.html">
                <img src="./images/Logo.png" alt="Logo" class="logo-img me-2"> Geo Wear</a>
            <ul class="menu d-flex gap-3 list-unstyled m-0">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="product-details.html">product-details</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="Login.html">Login</a></li>
                <li><a href="Register.html">Register</a></li>
                <li><a href="Profile.html">Profile</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="container mt-5">
        <h1>Checkout</h1>
        <h3>Billing Information</h3>
        <label>Name:</label>
        <input type="text" id="name" class="form-control mb-3">
        <label>Address:</label>
        <input type="text" id="address" class="form-control mb-3">
        <label>Payment Method:</label>
        <select id="payment" class="form-control mb-3">
            <option value="">Select</option>
            <option>Credit Card</option>
            <option>Debit Card</option>
            <option>PayPal</option>
        </select>
        <h3>Order Summary</h3>
        <div id="summary"></div>
        <h4>Total: <span id="total"></span></h4>
        <button class="btn btn-success mt-3" onclick="placeOrder()">Place Order</button>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        const summaryDiv = document.getElementById("summary");
        const totalDiv = document.getElementById("total");
        function displaySummary() {
            let total = 0;
            summaryDiv.innerHTML = "";
            if (cart.length === 0) {
                summaryDiv.innerHTML = "<p>Your cart is empty.</p>";
                totalDiv.textContent = "$0";
                return;
            }
            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;

                summaryDiv.innerHTML += `
            <p>${item.name} (x${item.quantity}) - $${itemTotal}</p>
        `;
            });
            totalDiv.textContent = "$" + total;
        }
        function placeOrder() {
            const name = document.getElementById("name").value.trim();
            const address = document.getElementById("address").value.trim();
            const payment = document.getElementById("payment").value;
            if (!name || !address || !payment) {
                alert("Please fill all fields");
                return;
            }
            if (cart.length === 0) {
                alert("The cart is empty");
                return;
            }
            alert("Order placed successfully!");
            localStorage.removeItem("cart");
            window.location.href = "index.html";
        }
        displaySummary();
    </script>
</body>
<footer class="bg-dark text-white mt-5 py-4">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-4 text-start">
                <p class="mb-0">©2026 Geo Wear</p>
            </div>
            <div class="col-md-4 text-center">
                <p class="mb-0">Email: helpcenter@geowear.com</p>
            </div>
            <div class="col-md-4 text-end">
                <a href="#" class="text-white">Back to top</a>
            </div>
        </div>
    </div>
</footer>

</html>
